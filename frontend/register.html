<!DOCTYPE html>
<html lang="en" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - HealthSenseAI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            brand: {
              light: '#f0fdf4',
              primary: '#0284c7',
              secondary: '#16a34a',
              dark: '#0f172a',
            }
          }
        }
      }
    }
  </script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 min-h-screen flex flex-col justify-between transition-colors duration-200">

  <!-- Header -->
  <header class="w-full glass shadow-sm h-16 flex items-center justify-between px-4 sm:px-6 lg:px-8">
    <a href="index.html" class="flex items-center gap-2">
      <div class="bg-sky-500 text-white p-2 rounded-xl shadow-md">
        <i class="fa-solid fa-heart-pulse text-xl"></i>
      </div>
      <span class="text-xl font-bold bg-gradient-to-r from-sky-600 to-emerald-600 bg-clip-text text-transparent dark:from-sky-400 dark:to-emerald-400">
        HealthSenseAI
      </span>
    </a>
  </header>

  <!-- Register Main Content -->
  <main class="flex-grow flex items-center justify-center p-4 py-8">
    <div class="w-full max-w-md bg-white dark:bg-slate-800 rounded-3xl border border-slate-100 dark:border-slate-700/50 shadow-2xl p-8 relative overflow-hidden animate-fade-in">
      <div class="absolute top-0 left-0 w-full h-2 bg-gradient-to-r from-sky-500 to-emerald-500"></div>
      
      <div class="text-center mb-6">
        <h1 class="text-3xl font-extrabold tracking-tight">Create Account</h1>
        <p class="text-slate-500 dark:text-slate-400 mt-2 text-sm">Join HealthSenseAI for smart health insights</p>
      </div>

      <!-- Alert Banner -->
      <div id="alert-banner" class="hidden mb-6 p-4 rounded-xl text-sm border flex items-start gap-3">
        <i class="fa-solid fa-circle-exclamation text-lg mt-0.5" id="alert-icon"></i>
        <div id="alert-message"></div>
      </div>

      <form id="register-form" class="space-y-4">
        <div>
          <label for="fullName" class="block text-sm font-semibold mb-1">Full Name</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
              <i class="fa-solid fa-user"></i>
            </div>
            <input type="text" id="fullName" required class="block w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/50 focus:border-sky-500 focus:ring-2 focus:ring-sky-500/20 focus:outline-none transition-all text-sm" placeholder="John Doe">
          </div>
        </div>

        <div>
          <label for="email" class="block text-sm font-semibold mb-1">Email Address</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
              <i class="fa-solid fa-envelope"></i>
            </div>
            <input type="email" id="email" required class="block w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/50 focus:border-sky-500 focus:ring-2 focus:ring-sky-500/20 focus:outline-none transition-all text-sm" placeholder="you@example.com">
          </div>
        </div>

        <div>
          <label for="password" class="block text-sm font-semibold mb-1">Password</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
              <i class="fa-solid fa-lock"></i>
            </div>
            <input type="password" id="password" required class="block w-full pl-10 pr-12 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/50 focus:border-sky-500 focus:ring-2 focus:ring-sky-500/20 focus:outline-none transition-all text-sm" placeholder="••••••••">
            <button type="button" id="toggle-password" class="absolute inset-y-0 right-0 pr-3 flex items-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-300">
              <i class="fa-solid fa-eye"></i>
            </button>
          </div>
        </div>

        <div>
          <label for="confirmPassword" class="block text-sm font-semibold mb-1">Confirm Password</label>
          <div class="relative">
            <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-400">
              <i class="fa-solid fa-lock-open"></i>
            </div>
            <input type="password" id="confirmPassword" required class="block w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900/50 focus:border-sky-500 focus:ring-2 focus:ring-sky-500/20 focus:outline-none transition-all text-sm" placeholder="••••••••">
          </div>
        </div>

        <button type="submit" class="w-full bg-gradient-to-r from-sky-500 to-emerald-500 hover:from-sky-600 hover:to-emerald-600 text-white py-3 rounded-xl font-bold shadow-md shadow-sky-500/10 transition-all transform hover:-translate-y-0.5 flex justify-center items-center gap-2 mt-2">
          <span>Sign Up</span>
          <i class="fa-solid fa-user-plus"></i>
        </button>
      </form>

      <div class="mt-6 text-center text-sm">
        <span class="text-slate-500 dark:text-slate-400">Already have an account?</span>
        <a href="login.html" class="text-sky-600 dark:text-sky-400 font-bold hover:underline ml-1">Log In</a>
      </div>
    </div>
  </main>

  <!-- Footer -->
  <footer class="py-4 border-t border-slate-100 dark:border-slate-800 text-center text-xs text-slate-400 bg-white dark:bg-slate-950">
    &copy; 2026 HealthSenseAI. For educational purposes only.
  </footer>

  <script src="js/api.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const alertBanner = document.getElementById('alert-banner');
    const alertMessage = document.getElementById('alert-message');
    const alertIcon = document.getElementById('alert-icon');
    const passwordInput = document.getElementById('password');
    const togglePasswordBtn = document.getElementById('toggle-password');
    
    function showAlert(type, msg) {
      alertBanner.classList.remove('hidden', 'bg-red-50', 'border-red-200', 'text-red-700', 'bg-green-50', 'border-green-200', 'text-green-700');
      
      if (type === 'error') {
        alertBanner.classList.add('bg-red-50', 'border-red-200', 'text-red-700', 'dark:bg-red-950/20', 'dark:border-red-900/30', 'dark:text-red-400');
        alertIcon.className = 'fa-solid fa-circle-exclamation text-lg mt-0.5 text-red-500';
      } else {
        alertBanner.classList.add('bg-green-50', 'border-green-200', 'text-green-700', 'dark:bg-green-950/20', 'dark:border-green-900/30', 'dark:text-green-400');
        alertIcon.className = 'fa-solid fa-circle-check text-lg mt-0.5 text-green-500';
      }
      
      alertMessage.textContent = msg;
    }

    // Toggle password visibility
    togglePasswordBtn.addEventListener('click', () => {
      const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
      passwordInput.setAttribute('type', type);
      const icon = togglePasswordBtn.querySelector('i');
      icon.className = type === 'password' ? 'fa-solid fa-eye' : 'fa-solid fa-eye-slash';
    });

    // Handle Form Submit
    document.getElementById('register-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fullName = document.getElementById('fullName').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = passwordInput.value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      
      // Validation checks
      if (password !== confirmPassword) {
        showAlert('error', 'Passwords do not match.');
        return;
      }
      
      const submitBtn = e.target.querySelector('button[type="submit"]');
      const origBtnContent = submitBtn.innerHTML;
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<i class="fa-solid fa-circle-notch loader-spinner text-lg"></i> Creating Account...';
      
      try {
        await api.register(fullName, email, password, confirmPassword);
        window.location.href = 'login.html?registered=true';
      } catch (err) {
        showAlert('error', err.message || 'Registration failed. Email might already be in use.');
        submitBtn.disabled = false;
        submitBtn.innerHTML = origBtnContent;
      }
    });
  </script>
</body>
</html>
